name: Contexts Demo

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      config:
        description: 'JSON config: {"env":"...","replicas":N}'
        required: true
        type: string
        default: '{"env":"staging","replicas":2}'

jobs:
  filters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Object filter on a push event
        if: github.event_name == 'push'
        run: |
          echo "All commit messages on this push:"
          echo "${{ join(github.event.commits.*.message, ' || ') }}"
          echo "All commit authors on this push:"
          echo "${{ join(github.event.commits.*.author.name, ', ') }}"

      - name: fromJSON round trip on workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Raw input: ${{ inputs.config }}"
          echo "Parsed env:      ${{ fromJSON(inputs.config).env }}"
          echo "Parsed replicas: ${{ fromJSON(inputs.config).replicas }}"
