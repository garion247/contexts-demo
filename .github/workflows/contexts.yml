name: Contexts Demo

on:
  push:
    branches: [ master ]

jobs:
  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: contains / startsWith / endsWith
        run: |
          echo "contains:   ${{ contains(github.ref, 'master') }}"
          echo "startsWith: ${{ startsWith(github.ref, 'refs/heads/') }}"
          echo "endsWith:   ${{ endsWith(github.ref, 'master') }}"

      - name: format
        run: |
          echo "${{ format('Hello {0} from run #{1}', github.actor, github.run_number) }}"

      - name: join (uses object filter on commits)
        run: |
          echo "Commit messages: ${{ join(github.event.commits.*.message, ' | ') }}"

      - name: toJSON / fromJSON round trip
        env:
          CFG: '{"replicas":3,"tier":"Standard"}'
        run: |
          echo "Replicas: ${{ fromJSON(env.CFG).replicas }}"
          echo "Tier:     ${{ fromJSON(env.CFG).tier }}"
          echo "As JSON:  ${{ toJSON(github.repository_owner) }}"

      - name: hashFiles
        run: |
          echo "Hash of all package*.json: ${{ hashFiles('**/package*.json') }}"
          echo "Use the hash as a cache key for invalidation when deps change"
