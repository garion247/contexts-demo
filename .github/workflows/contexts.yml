name: Contexts Demo

on:
  push:
    branches: [ master, 'release/**' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Override target environment'
        required: false
        type: choice
        default: ''
        options: [ '', development, staging, production ]

env:
  TARGET_ENV: >-
    ${{
      (github.event_name == 'workflow_dispatch' && inputs.environment != '' && inputs.environment) ||
      (github.ref == 'refs/heads/master' && 'production') ||
      (startsWith(github.ref, 'refs/heads/release/') && 'staging') ||
      'development'
    }}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Show resolved environment
        run: |
          echo "Trigger: ${{ github.event_name }} on ${{ github.ref }}"
          echo "TARGET_ENV resolved to: ${{ env.TARGET_ENV }}"
